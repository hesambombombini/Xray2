worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $request [$status] '
                    '$body_bytes_sent "$http_user_agent"';
    access_log off;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream dashboard {
        server 127.0.0.1:8000;
        keepalive 8;
    }

    upstream xray_vless {
        server 127.0.0.1:10000;
        keepalive 8;
    }

    upstream xray_trojan {
        server 127.0.0.1:10001;
        keepalive 8;
    }

    upstream xray_xhttp {
        server 127.0.0.1:10004;
        keepalive 8;
    }

    server {
        # Railway TLS رو handle می‌کنه؛ ما روی PORT داخلی گوش می‌دیم
        # شبکه‌ی داخلی Railway روی IPv6 کار می‌کنه، پس باید هر دو رو گوش بدیم
        listen ${NGINX_PORT};
        listen [::]:${NGINX_PORT};
        server_name _;

        # ── VLESS WebSocket ──
        location /xray-ws {
            proxy_pass http://xray_vless;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_buffering     off;
        }

        # ── Trojan WebSocket ──
        location /xray-trojan {
            proxy_pass http://xray_trojan;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_buffering     off;
        }

        # ── VLESS XHTTP (بدون نیاز به Upgrade header، فقط POST/GET ساده) ──
        location /xray-xhttp {
            proxy_pass http://xray_xhttp;
            proxy_http_version 1.1;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_request_buffering off;
            proxy_buffering     off;
        }

        # ── Dashboard / API ──
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 60s;
        }
    }
}
