[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway $PORT رو inject می‌کنه؛ entrypoint.sh اون رو به Nginx می‌ده
healthcheckPath    = "/health"
healthcheckTimeout = 45
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
# داده‌های persistent (لینک‌ها، کانفیگ Xray)
mountPath = "/data"

[[services]]
name = "tryak-xray"
